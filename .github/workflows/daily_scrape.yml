name: 다나와 가격 자동 수집

on:
  schedule:
    # 매일 오전 9시 (KST) — UTC 00:05
    - cron: "5 0 * * *"
  workflow_dispatch:

jobs:

  # ── Job 1: 다나와 수집 (requests, 약 4분) ──────────────
  danawa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 다나와 수집 실행
        run: python scraper_danawa.py

      - name: CSV 업로드 (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: danawa-csv
          path: data/danawa/danawa_*.csv
          retention-days: 2

  # ── Job 2: 컴퓨존 수집 (Playwright, 약 8~10분) ─────────
  compuzone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 컴퓨존 수집 실행
        run: python scraper_compuzone.py

      - name: CSV 업로드 (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: compuzone-csv
          path: data/compuzone/compuzone_*.csv
          retention-days: 2

  # ── Job 3: 샵다나와 수집 (requests, 약 4분) ────────────
  shopdanawa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 샵다나와 수집 실행
        run: python scraper_shopdanawa.py

      - name: CSV 업로드 (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: shopdanawa-csv
          path: data/shopdanawa/shopdanawa_*.csv
          retention-days: 2

  # ── Job 4: 비교 + Slack 리포트 (Job 1, 2, 3 완료 후) ───
  compare:
    runs-on: ubuntu-latest
    needs: [danawa, compuzone, shopdanawa]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 다나와 CSV 다운로드
        uses: actions/download-artifact@v4
        with:
          name: danawa-csv
          path: data/danawa

      - name: 컴퓨존 CSV 다운로드
        uses: actions/download-artifact@v4
        with:
          name: compuzone-csv
          path: data/compuzone

      - name: 샵다나와 CSV 다운로드
        uses: actions/download-artifact@v4
        with:
          name: shopdanawa-csv
          path: data/shopdanawa

      - name: 다운로드 경로 확인
        run: |
          echo "=== data/danawa ===" && ls data/danawa/ || echo "없음"
          echo "=== data/compuzone ===" && ls data/compuzone/ || echo "없음"
          echo "=== data/shopdanawa ===" && ls data/shopdanawa/ || echo "없음"

      - name: 전날 비교 CSV 복원 (있을 경우)
        run: |
          git fetch origin
          YESTERDAY=$(date -d 'yesterday' +'%Y-%m-%d')
          mkdir -p data/price_comparison
          git show origin/main:data/price_comparison/price_comparison_${YESTERDAY}.csv > data/price_comparison/price_comparison_${YESTERDAY}.csv 2>/dev/null || true

      - name: 비교 & Slack 리포트
        run: python scraper_compare.py
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID:   ${{ secrets.SLACK_USER_ID }}

      - name: 결과 CSV 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/danawa/ data/compuzone/ data/shopdanawa/ data/price_comparison/ data/gpu_group_summary/
          git diff --staged --quiet || git commit -m "chore: 가격 수집 $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
